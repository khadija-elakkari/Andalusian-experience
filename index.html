<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<title>Moroccan Heritage</title>

<style>
body{
    margin:0;
    background:#0a0f0d;
    color:#f5e6c8;
    font-family:'Amiri', serif;
    overflow:hidden;
}

/* INTRO */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:#0a0f0d;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
}

#enterBtn{
    margin-top:20px;
    padding:12px 40px;
    background:transparent;
    border:1px solid gold;
    color:gold;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    transition:0.4s;
}

#enterBtn:hover{
    background:gold;
    color:black;
}

/* BACKGROUND زخرفة */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
    url('https://www.transparenttextures.com/patterns/moroccan-flower.png');
    animation:moveBg 60s linear infinite;
    z-index:-1;
}

@keyframes moveBg{
    from{background-position:0 0;}
    to{background-position:400px 400px;}
}

/* TITLE */
.title{
    text-align:center;
    margin-top:100px;
    font-size:55px;
    font-family:'Cinzel', serif;
    letter-spacing:5px;
    color:gold;
    opacity:0;
    animation:fade 3s forwards;
}

@keyframes fade{
    to{opacity:1;}
}

/* زخرفة خط */
.decor{
    width:150px;
    height:3px;
    background:linear-gradient(to right, transparent, gold, transparent);
    margin:25px auto;
}

/* CONTENT */
.content{
    width:60%;
    margin:40px auto;
    text-align:center;
    font-size:20px;
    line-height:2;
    opacity:0;
    animation:fade 4s forwards;
}

/* ORNAMENT (زخارف جانبية) */
.ornament{
    position:absolute;
    width:120px;
    opacity:0.15;
}

.left{left:10px; top:150px;}
.right{right:10px; top:150px; transform:scaleX(-1);}

/* NAMES (ستايل فاخر) */
.names{
    position:absolute;
    bottom:25px;
    width:100%;
    text-align:center;
    font-size:14px;
    letter-spacing:4px;
    color:#d4c08a;
    opacity:0;
    animation:credits 6s forwards;
}

@keyframes credits{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:0.85; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1 style="font-family:'Cinzel'; letter-spacing:4px; color:gold;">
        Moroccan Heritage
    </h1>
    <button id="enterBtn">Enter</button>
</div>

<div class="bg"></div>

<!-- زخارف -->
<img class="ornament left" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Arabesque_design.svg/512px-Arabesque_design.svg.png">
<img class="ornament right" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Arabesque_design.svg/512px-Arabesque_design.svg.png">

<h1 class="title">Andalusian Elegance</h1>

<div class="decor"></div>

<div class="content">
    A refined journey into Moroccan Andalusian music,  
    where elegance, tradition, and harmony blend  
    into a timeless artistic expression.
</div>

<!-- الأسامي -->
<div class="names">
    Khadija EL Akkari • Salma EL Fadili • Salma EL Massaadi
</div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const btn = document.getElementById("enterBtn");
const intro = document.getElementById("intro");
const music = document.getElementById("music");

btn.onclick = () => {
    intro.style.display="none";
    music.play();
}
</script>

</body>
</html>
